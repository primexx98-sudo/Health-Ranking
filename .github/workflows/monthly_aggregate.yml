name: Monthly Aggregate

on:
  schedule:
    - cron: '0 0 1 * *'   # 매월 1일 UTC 00:00 = KST 09:00
  workflow_dispatch:        # 수동 실행

permissions:
  contents: write

jobs:
  aggregate:
    runs-on: ubuntu-22.04
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 (일별 파일 전체 필요)

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run monthly aggregate
        run: python monthly_aggregate.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/monthly/
          git diff --cached --quiet && echo "변경 없음" || \
            git commit -m "data: $(date '+%Y-%m') 월별 취합"
          git pull --rebase
          git push
